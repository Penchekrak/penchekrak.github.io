<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>кто кого знает</title><style>html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
        }
        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .sidebar {
            width: 320px;
            min-width: 240px;
            max-width: 400px;
            background: #ecf0f1;
            border-right: 1px solid #bdc3c7;
            display: flex;
            flex-direction: column;
            padding: 0;
            box-sizing: border-box;
        }
        .search-container {
            padding: 24px 20px 12px 20px;
            background: #ecf0f1;
            border-bottom: 1px solid #bdc3c7;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #3498db;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .search-input:focus {
            border-color: #2980b9;
        }
        .reset-button {
            padding: 12px 16px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            white-space: nowrap;
            font-weight: 500;
        }
        .reset-button:hover {
            background-color: #c0392b;
        }
        .reset-button:active {
            background-color: #a93226;
        }
        .search-results {
            padding: 10px 20px;
            background: #e8f5e8;
            border-bottom: 1px solid #c3e6c3;
            font-size: 14px;
            color: #2d5a2d;
        }
        .search-results.hidden {
            display: none;
        }
        .search-result-item {
            padding: 8px 12px;
            margin: 4px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.2s ease;
            border: 1px solid transparent;
        }
        .search-result-item:hover {
            background-color: #d5e8d5;
            border-color: #a8d5a8;
        }
        .search-result-item:active {
            background-color: #c3e6c3;
        }
        .sidebar-content {
            flex: 1 1 auto;
            overflow-y: auto;
            background: #ecf0f1;
        }
        .graph-area {
            flex: 1 1 0;
            position: relative;
            background: #fff;
            min-width: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .graph-container {
            flex: 1 1 0;
            position: relative;
            width: 100%;
            height: 100%;
            background: #fff;
            min-width: 0;
            min-height: 0;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            pointer-events: none;
            z-index: 1000;
            max-width: 200px;
            word-wrap: break-word;
        }
        .tooltip.hidden {
            display: none;
        }
        
        /* Custom styles for square nodes */
        .sigma-square-node {
            border-radius: 4px;
            border: 2px solid #2c3e50;
        }
        @media (max-width: 700px) {
            .main-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100vw;
                max-width: none;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid #bdc3c7;
            }
            .graph-area {
                height: 60vh;
                min-height: 300px;
            }
        }</style><script defer="defer" src="bundle.js"></script></head><body><div class="main-layout"><div class="sidebar"><div class="search-container"><input class="search-input" placeholder="имя или телега..." id="searchInput"> <button class="reset-button" id="resetButton">⎌</button></div><div class="sidebar-content"><div class="search-results hidden" id="searchResults"></div></div></div><div class="graph-area"><div class="graph-container" id="graphContainer"><div class="tooltip hidden" id="tooltip"></div></div></div></div></body></html>
